<!doctype html>
<html>
	
<head>
	<meta charset="utf-8">
	<title>Contact Us</title>
	<link rel="stylesheet" href="Subway.css">
</head>
	
<body>
	
<div class="pageContainer">
<header>
	
	<div class="titleLogo">
		
	<h1>
		Subway&trade;
	</h1>
	
	<a href="index.html"><img src="images/subway.png" alt="Subwaylogo" class="logo"></a>
		
	</div>
	
	<nav>
		<a href="Menu.html">Menu</a>
		<a href="About.html">About</a>
		<a href="Locations.html">Locations</a>
		<a href="ContactUs.html">Contact us</a>
	</nav>
	
</header>

<main>
	<section class="contactForm">
		<form action="/action_page.php">
  			<label for="fname">First name:</label><br>
  			<input type="text" id="fname" name="fname" value="enter your first name"><br>
  			<label for="lname">Last name:</label><br>
  			<input type="text" id="lname" name="lname" value="enter your last name"><br><br>
			<label for="reason">What is your reason for contacting us?</label><br>
			<input type="radio" id="complaint" name="reason">
			<label for="complaint">Complaint</label><br>
			<input type="radio" id="investment" name="reason">
			<label for="investment">Investment</label><br>
			<input type="radio" id="support" name="reason">
			<label for="support">Customer Support</label><br><br>
			<label for="info">How would you like us to contact you?</label>
			<select name="contactInfo" id="info">
				<option value="email">Email</option>
				<option value="number">Phone number</option>
				<option value="letter">Letter</option>
			</select><br><br>
			<label for="contact">Enter your contact info.</label>
			<input type="text" id="contact" name="contact"><br><br>
			<label for="description">Can you write out a description of why you are contacting us.</label><br>
			<textarea id="description" name="description" rows="4" cols="50"></textarea><br>
			<input type="reset" value="Reset">
 			<input type="submit" value="Submit">
		</form> 
	</section>
</main>

<footer>
        <p>©2026 Subway</p>
</footer>
	  
</div>
</body>
</html>
